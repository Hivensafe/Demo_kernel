name: Build_security_new
on:
  workflow_dispatch:
    inputs:
      REPO_MANIFEST:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
        default: 'oneplus_ace5_pro'

      keep_original_settings:
        description: "📝保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      enable_feature_z:
        description: "添加风驰驱动"
        required: false
        default: true
        type: boolean

      enable_feature_b:
         description: "选择网络调度"
         required: false
         type: choice
         options:
            - 'FQ_CODEL'
            - 'BBR'
         default: 'FQ_CODEL'
      
       


jobs:
  build:
    name: Build_${{ github.event.inputs.REPO_MANIFEST }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 📊 Check disk space (检查磁盘空间)
        run: |
          echo "构建前磁盘空间："
          df -h
      
      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_ace5_pro_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_ace5_pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Ace_5_Pro" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_13_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_13" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=oneplus_13t" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13t" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_13_T" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=oneplus_pad_2_pro" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_pad_2_pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Pad_2_Pro_New" >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Ace_5_Ultra" >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=realme_GT7" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7" >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo "REPO_MANIFEST=realme_GT7pro" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo "REPO_MANIFEST=realme_GT7pro_Speed" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7pro_Speed" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV
              ;;
          esac
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_ace5_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g4dc61d72e02f-abogki415959920-4k' >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo 'DEFAULT_SUFFIX=-android15-8-g013ec21bba94-abogki383916444-4k' >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo 'DEFAULT_SUFFIX=-android15-8-g06c41a4a6e98-abogki395793266-4k' >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo 'DEFAULT_SUFFIX=-android15-8-gc6f5283046c6-ab12364222-4k' >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo 'DEFAULT_SUFFIX=-android15-8-gd43086512890-abogki423825152-4k' >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g7b1f455c7143-ab13591283-4k' >> $GITHUB_ENV
              ;;
            oneplus_13 | oneplus_ace5_ultra)
              echo 'DEFAULT_SUFFIX=-android15-8-g29d86c5fc9dd-abogki428889875-4k' >> $GITHUB_ENV
              ;;
          esac
          if [ "${{ github.event.inputs.keep_original_settings }}" = "false" ] && [ -n "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            echo "使用自定义构建时间: $CUSTOM_TIME"
            echo "KERNEL_TIME=$CUSTOM_TIME" >> $GITHUB_ENV
          else
            case "${{ github.event.inputs.REPO_MANIFEST }}" in
              oneplus_ace5_pro)
                echo 'KERNEL_TIME=Mon May 12 09:09:59 UTC 2025' >> $GITHUB_ENV
                ;;
              realme_GT7pro_Speed)
                echo 'KERNEL_TIME=Tue Dec 17 23:36:49 UTC 2024' >> $GITHUB_ENV
                ;;
              realme_GT7)
                echo 'KERNEL_TIME=Mon Jan 20 03:24:58 UTC 2025' >> $GITHUB_ENV
                ;;
              realme_GT7pro)
                echo 'KERNEL_TIME=Fri Sep 13 02:08:57 UTC 2024' >> $GITHUB_ENV
                ;;
              oneplus_13t)
                echo 'KERNEL_TIME=Tue Jun 10 12:12:23 UTC 2025' >> $GITHUB_ENV
                ;;
              oneplus_pad_2_pro)
                echo 'KERNEL_TIME=Tue Jun  3 03:22:33 UTC 2025' >> $GITHUB_ENV
                ;;
              oneplus_13 | oneplus_ace5_ultra)
                echo 'KERNEL_TIME=Tue Jul  1 19:48:18 UTC 2025' >> $GITHUB_ENV
                ;;
            esac
          fi
      - name: ⚙️ Set device-specific CCACHE_DIR (设置对应机型Cceche路径)
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${REPO_MANIFEST}" >> $GITHUB_ENV

      - name: 📦 Configure Git (设置下载账户)
        run: |
          git config --global user.name "Q1udaoyu"
          git config --global user.email "sucisama2888@gmail.com"

      - name: 🛠 Configure APT caching (配置APT缓存)
        run: |
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR"/{archives,lists/partial}
          echo "Dir::Cache \"$APT_CACHE_DIR\";" | sudo tee /etc/apt/apt.conf.d/90user-cache
          echo "Dir::Cache::archives \"$APT_CACHE_DIR/archives\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Dir::State::lists \"$APT_CACHE_DIR/lists\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Check-Valid-Until \"false\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Languages \"none\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          sudo chown -R $USER:$USER "$APT_CACHE_DIR"

      - name: 🛠 Cache APT packages (缓存APT包)
        uses: actions/cache@v3
        with:
          path: ${{ env.HOME }}/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_serialID_check.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: 📦 Install dependencies (安装依赖)
        run: |
          sudo rm -f /var/lib/apt/lists/lock /var/lib/dpkg/lock
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR/lists/partial"
          sudo apt -o Dir::Cache="$APT_CACHE_DIR" update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt -o Dir::Cache="$APT_CACHE_DIR" install -yq --no-install-recommends \
            python3 p7zip-full git curl ccache libelf-dev \
            build-essential libelf-dev flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip
          
          echo "✅ 依赖安装完成"
          
      - name: 📥 Restore ccache (载入 机型：${{ env.DEVICES_NAME }}的 ccache 缓存)
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref }}-${{ env.REPO_MANIFEST }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.REPO_MANIFEST }}-
            ccache-${{ runner.os }}-

      - name: 📥 Init ccache (如果是第一次运行则初始化Cceche)
        run: |
          export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"

          INIT_FLAG="$CCACHE_DIR/.ccache_initialized"
          if command -v ccache >/dev/null 2>&1; then
            if [ ! -f "$INIT_FLAG" ]; then
              echo "初始化 ccache ($CCACHE_DIR)..."
              mkdir -p "$CCACHE_DIR"
              ccache -M "$CCACHE_MAXSIZE"
              touch "$INIT_FLAG"
            else
              echo "ccache 已初始化，跳过"
            fi
          else
            echo "未安装 ccache，跳过"
          fi


      - name: 📥 Install repo tool (下载repo工具)
        run: |
         curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
         chmod a+x ~/repo
         sudo mv ~/repo /usr/local/bin/repo

      - name: 📥 Initialize repo and sync (初始化repo并同步内核源码)
        run: |
         mkdir kernel_workspace && cd kernel_workspace
         repo init -u https://github.com/showdo/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m ${REPO_MANIFEST}.xml --depth=1
         repo --trace sync -c -j$(nproc --all) --no-tags
         rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
         rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"

      - name: Patch main.c (cat拼接soc0 serial_number panic校验)
        working-directory: kernel_workspace/kernel_platform/common
        run: |
          # # 防重复 patch
          # if grep -q 'SOC_SN_CHECK' init/main.c; then
          #   echo "main.c 已包含 patch, 跳过"
          #   exit 0
          # fi
          # cp "${GITHUB_WORKSPACE}/.github/workflows/tools/serialid_check.c" ./
          # LINE=$(grep -n '^#include' init/main.c | tail -n 1 | cut -d: -f1)
          # head -n "$LINE" init/main.c > init/main.c.patched
          # cat serialid_check.c >> init/main.c.patched
          # tail -n +$((LINE+1)) init/main.c >> init/main.c.patched
          # mv init/main.c.patched init/main.c
          # echo "已自动插入 serialid_check.c 到 main.c"
          
          cat > security/baseband_guard.c <<'EOF'
          // SPDX-License-Identifier: GPL-2.0
          /*
           * baseband_guard_friendly: LSM to deny writes to critical baseband/bootloader partitions
           * 
           * Goals vs original version:
           *  - Same protection guarantees (deny actual writes + destructive ioctls)
           *  - Zero busy-looping; background retries use exponential backoff and auto-stop
           *  - Reverse dev_t match kept for first-write denial, but with per-name cooldown to avoid storms
           *  - Log output is rate-limited and quiet by default (use pr_debug or BB_VERBOSE to turn up)
           *  - No directory walks; no tight retry in hot paths; no timers with small periods
           *
           * Tested ABI assumptions:
           *  - Linux 6.6: lookup_bdev(const char *path, dev_t *dev)
           */
          
          #include <linux/module.h>
          #include <linux/init.h>
          #include <linux/security.h>
          #include <linux/lsm_hooks.h>
          #include <linux/fs.h>
          #include <linux/namei.h>
          #include <linux/blkdev.h>
          #include <linux/blk_types.h>
          #include <linux/slab.h>
          #include <linux/hashtable.h>
          #include <linux/string.h>
          #include <linux/errno.h>
          #include <linux/version.h>
          #include <linux/jiffies.h>
          #include <linux/workqueue.h>
          
          /* ===== Build-time knobs (can be mirrored in Kconfig) ===== */
          #define BB_ENFORCING 1
          
          #ifdef CONFIG_SECURITY_BASEBAND_GUARD_ALLOW_IN_RECOVERY
          #define BB_ALLOW_IN_RECOVERY 1
          #else
          #define BB_ALLOW_IN_RECOVERY 0
          #endif
          
          #ifdef CONFIG_SECURITY_BASEBAND_GUARD_PROTECT_BOOTIMG
          #define BB_PROTECT_BOOTIMG 1
          #else
          #define BB_PROTECT_BOOTIMG 0
          #endif
          
          #ifdef CONFIG_SECURITY_BASEBAND_GUARD_VERBOSE
          #define BB_VERBOSE 1
          #else
          #define BB_VERBOSE 0
          #endif
          
          /* Quiet by default */
          #define bb_pr(fmt, ...)          pr_debug("baseband_guard: " fmt, ##__VA_ARGS__)
          #define bb_pr_rl(fmt, ...)       pr_info_ratelimited("baseband_guard: " fmt, ##__VA_ARGS__)
          
          #define BB_BYNAME_DIR "/dev/block/by-name"
          
          extern char *saved_command_line; /* from init/main.c */
          
          struct name_entry { const char *name; u8 st; };
          enum res_state { RS_UNKNOWN = 0, RS_OK = 1, RS_FAIL = 2 };
          
          action_unused static const char *slot_suffix_from_cmdline(void)
          {
          	const char *p = saved_command_line;
          	if (!p) return NULL;
          	p = strstr(p, "androidboot.slot_suffix=");
          	if (!p) return NULL;
          	p += strlen("androidboot.slot_suffix=");
          	if (p[0] == '_' && (p[1] == 'a' || p[1] == 'b'))
          		return (p[1] == 'a') ? "_a" : "_b";
          	return NULL;
          }
          
          /* === Protected partition names (customize as needed) === */
          static struct name_entry core_names[] = {
          	{ "xbl", RS_UNKNOWN }, { "xbl_config", RS_UNKNOWN }, { "uefi", RS_UNKNOWN },
          	{ "uefisecapp", RS_UNKNOWN }, { "abl", RS_UNKNOWN },
          	{ "modem", RS_UNKNOWN }, { "modemst1", RS_UNKNOWN }, { "modemst2", RS_UNKNOWN },
          	{ "fsg", RS_UNKNOWN }, { "fsc", RS_UNKNOWN }, { "connsec", RS_UNKNOWN },
          	{ "mdm1oemnvbktmp", RS_UNKNOWN }, { "oplusdycnvbk", RS_UNKNOWN }, { "oplusstanvbk", RS_UNKNOWN },
          	{ "nvram", RS_UNKNOWN }, { "nvdata", RS_UNKNOWN }, { "nvcfg", RS_UNKNOWN },
          	{ "md_sec", RS_UNKNOWN }, { "sec1", RS_UNKNOWN }, { "seccfg", RS_UNKNOWN },
          	{ "vbmeta", RS_UNKNOWN }, { "vbmeta_system", RS_UNKNOWN }, { "vbmeta_vendor", RS_UNKNOWN },
          	{ "tz", RS_UNKNOWN }, { "hyp", RS_UNKNOWN }, { "keymaster", RS_UNKNOWN }, { "keystore", RS_UNKNOWN },
          	{ "storsec", RS_UNKNOWN }, { "secdata", RS_UNKNOWN }, { "ssd", RS_UNKNOWN },
          	{ "pvmfw", RS_UNKNOWN }, { "vm-bootsys", RS_UNKNOWN }, { "vm-persist", RS_UNKNOWN },
          	{ "imagefv", RS_UNKNOWN }, { "toolsfv", RS_UNKNOWN }, { "tee", RS_UNKNOWN }, { "rotfw", RS_UNKNOWN },
          	{ "frp", RS_UNKNOWN }, { "preloader_raw", RS_UNKNOWN }, { "lk", RS_UNKNOWN },
          	{ "bootloader1", RS_UNKNOWN }, { "bootloader2", RS_UNKNOWN }, { "ocdt", RS_UNKNOWN },
          };
          static const size_t core_names_cnt = ARRAY_SIZE(core_names);
          
          /* === Protected dev_t cache === */
          struct bbg_node { dev_t dev; struct hlist_node h; };
          DEFINE_HASHTABLE(bbg_protected_devs, 7); /* 128 buckets */
          static bool bbg_cache_built;
          
          /* === Friendly background retry state === */
          struct miss_entry {
          	/* next time we may try resolving this name again */
          	unsigned long next_retry_jiffies;
          	/* current backoff step in jiffies */
          	unsigned long backoff;
          };
          static struct miss_entry *misses; /* [core_names_cnt] */
          
          static struct delayed_work bbg_retry_work;
          static struct workqueue_struct *bbg_wq;
          static unsigned int bbg_live_miss_cnt; /* how many RS_FAIL remain */
          
          /* Backoff parameters (soft, battery friendly) */
          static const unsigned long BB_RETRY_BACKOFF_INIT = HZ;         /* 1s */
          static const unsigned long BB_RETRY_BACKOFF_MAX  = 60 * HZ;    /* 60s */
          static const unsigned long BB_RETRY_TOTAL_BUDGET = 5 * 60 * HZ;/* stop ~5min */
          static unsigned long bbg_retry_budget; /* decremented in worker */
          
          static bool in_recovery_mode(void)
          {
          #if BB_ALLOW_IN_RECOVERY
          	if (!saved_command_line) return false;
          	if (strstr(saved_command_line, "androidboot.mode=recovery")) return true;
          #endif
          	return false;
          }
          
          static bool cache_has(dev_t dev)
          {
          	struct bbg_node *p;
          	hash_for_each_possible(bbg_protected_devs, p, h, (u64)dev)
          		if (p->dev == dev) return true;
          	return false;
          }
          
          static void cache_add(dev_t dev)
          {
          	struct bbg_node *n;
          	if (!dev || cache_has(dev)) return;
          	n = kmalloc(sizeof(*n), GFP_KERNEL);
          	if (!n) return;
          	n->dev = dev;
          	hash_add(bbg_protected_devs, &n->h, (u64)dev);
          	bb_pr("protect dev %u:%u\n", MAJOR(dev), MINOR(dev));
          }
          
          static bool resolve_byname_dev(const char *name, dev_t *out)
          {
          	char *path = kasprintf(GFP_KERNEL, "%s/%s", BB_BYNAME_DIR, name);
          	dev_t dev; int ret;
          	if (!path) return false;
          	ret = lookup_bdev(path, &dev);
          	kfree(path);
          	if (ret) return false;
          	*out = dev;
          	return true;
          }
          
          static void set_fail_with_backoff(size_t i)
          {
          	if (core_names[i].st == RS_FAIL) {
          		/* already a fail; extend backoff up to max */
          		misses[i].backoff = min(misses[i].backoff * 2 ?: BB_RETRY_BACKOFF_INIT, BB_RETRY_BACKOFF_MAX);
          	} else {
          		/* first time we realize it's a miss */
          		misses[i].backoff = BB_RETRY_BACKOFF_INIT;
          		bbg_live_miss_cnt++;
          	}
          	misses[i].next_retry_jiffies = jiffies + misses[i].backoff;
          	core_names[i].st = RS_FAIL;
          }
          
          static void mark_ok(size_t i)
          {
          	if (core_names[i].st == RS_FAIL && bbg_live_miss_cnt > 0)
          		bbg_live_miss_cnt--;
          	core_names[i].st = RS_OK;
          	misses[i].backoff = 0;
          	misses[i].next_retry_jiffies = 0;
          }
          
          static void try_resolve_name(size_t i, const char *suf)
          {
          	dev_t dev; bool ok = false;
          	const char *n = core_names[i].name;
          
          	if (resolve_byname_dev(n, &dev)) { cache_add(dev); ok = true; }
          	if (!ok && suf) {
          		char *nm = kasprintf(GFP_KERNEL, "%s%s", n, suf);
          		if (nm) { if (resolve_byname_dev(nm, &dev)) { cache_add(dev); ok = true; } kfree(nm); }
          	}
          	if (!ok) {
          		char *na = kasprintf(GFP_KERNEL, "%s_a", n);
          		char *nb = kasprintf(GFP_KERNEL, "%s_b", n);
          		if (na) { if (resolve_byname_dev(na, &dev)) { cache_add(dev); ok = true; } kfree(na); }
          		if (!ok && nb) { if (resolve_byname_dev(nb, &dev)) { cache_add(dev); ok = true; } kfree(nb); }
          	}
          
          	if (ok) {
          		mark_ok(i);
          #if BB_VERBOSE
          		bb_pr("[OK] %s protected\n", n);
          #endif
          	} else {
          		set_fail_with_backoff(i);
          #if BB_VERBOSE
          		bb_pr("[MISS] %s not found\n", n);
          #endif
          	}
          }
          
          static void build_cache_once(void)
          {
          	const char *suf = slot_suffix_from_cmdline();
          	size_t i;
          
          	if (READ_ONCE(bbg_cache_built))
          		return;
          
          	misses = kcalloc(core_names_cnt, sizeof(*misses), GFP_KERNEL);
          	if (!misses)
          		return; /* we will limp along with reverse matching only */
          
          	for (i = 0; i < core_names_cnt; i++)
          		try_resolve_name(i, suf);
          
          	WRITE_ONCE(bbg_cache_built, true);
          
          	/* schedule background retry only if there are misses and we have budget */
          	bbg_retry_budget = BB_RETRY_TOTAL_BUDGET;
          	if (bbg_live_miss_cnt && bbg_wq)
          		schedule_delayed_work(&bbg_retry_work, BB_RETRY_BACKOFF_INIT);
          
          #if BB_VERBOSE
          	{
          		int cnt = 0; unsigned bkt; struct bbg_node *p;
          		hash_for_each(bbg_protected_devs, bkt, p, h) cnt++;
          		bb_pr("cache built, protected=%d, misses=%u\n", cnt, bbg_live_miss_cnt);
          	}
          #endif
          }
          
          static void bbg_retry_worker(struct work_struct *ws)
          {
          	const char *suf = slot_suffix_from_cmdline();
          	unsigned long now = jiffies;
          	size_t i; bool any_progress = false;
          
          	if (!misses || !bbg_retry_budget)
          		return;
          
          	for (i = 0; i < core_names_cnt; i++) {
          		if (core_names[i].st != RS_FAIL)
          			continue;
          		if (time_before(now, misses[i].next_retry_jiffies))
          			continue; /* still cooling down */
          		try_resolve_name(i, suf);
          		any_progress = true;
          	}
          
          	if (!bbg_live_miss_cnt) {
          #if BB_VERBOSE
          		bb_pr("all names resolved; stopping retries\n");
          #endif
          		return; /* stop scheduling */
          	}
          
          	if (bbg_retry_budget < BB_RETRY_BACKOFF_INIT) {
          		bb_pr_rl("retry budget exhausted; giving up gracefully (misses=%u)\n", bbg_live_miss_cnt);
          		return; /* stop scheduling */
          	}
          
          	/* budget accounting: charge at most once per pass */
          	if (any_progress)
          		bbg_retry_budget = (bbg_retry_budget > BB_RETRY_BACKOFF_INIT) ?
          				 bbg_retry_budget - BB_RETRY_BACKOFF_INIT : 0;
          
          	/* schedule next pass at the **minimum** next_retry among remaining misses */
          	{
          		unsigned long next = now + BB_RETRY_BACKOFF_MAX; /* upper bound */
          		for (i = 0; i < core_names_cnt; i++)
          			if (core_names[i].st == RS_FAIL)
          				next = min(next, misses[i].next_retry_jiffies);
          		/* ensure at least INIT delay and at most MAX */
          		next = clamp(next, now + BB_RETRY_BACKOFF_INIT, now + BB_RETRY_BACKOFF_MAX);
          		schedule_delayed_work(&bbg_retry_work, next - now);
          	}
          }
          
          static int deny(const char *why)
          {
          	if (!BB_ENFORCING) return 0;
          	if (BB_ALLOW_IN_RECOVERY && in_recovery_mode()) return 0;
          	bb_pr_rl("deny %s pid=%d comm=%s\n", why, current->pid, current->comm);
          	return -EPERM;
          }
          
          static bool is_destructive_ioctl(unsigned int cmd)
          {
          	switch (cmd) {
          	case BLKDISCARD:
          	case BLKSECDISCARD:
          	case BLKZEROOUT:
          #ifdef BLKPG
          	case BLKPG:
          #endif
          #ifdef BLKTRIM
          	case BLKTRIM:
          #endif
          #ifdef BLKRRPART
          	case BLKRRPART:
          #endif
          #ifdef BLKSETRO
          	case BLKSETRO:
          #endif
          #ifdef BLKSETBADSECTORS
          	case BLKSETBADSECTORS:
          #endif
          		return true;
          	default:
          		return false;
          	}
          }
          
          /* Reverse dev_t match with per-name cooldown to avoid storms */
          static bool reverse_dev_match_and_cache(dev_t cur)
          {
          	size_t i; dev_t d; bool hit = false; const char *suf = slot_suffix_from_cmdline();
          	unsigned long now = jiffies;
          
          	for (i = 0; i < core_names_cnt; i++) {
          		/* Skip names that recently failed to resolve (cooldown) */
          		if (misses && core_names[i].st == RS_FAIL && time_before(now, misses[i].next_retry_jiffies))
          			continue;
          
          		if (resolve_byname_dev(core_names[i].name, &d) && d == cur) {
          			hit = true;
          			goto out;
          		}
          		if (suf) {
          			char *nm = kasprintf(GFP_ATOMIC, "%s%s", core_names[i].name, suf);
          			if (nm) { if (resolve_byname_dev(nm, &d) && d == cur) { kfree(nm); hit = true; goto out; } kfree(nm); }
          		} else {
          			char *na = kasprintf(GFP_ATOMIC, "%s_a", core_names[i].name);
          			char *nb = kasprintf(GFP_ATOMIC, "%s_b", core_names[i].name);
          			if (na) { if (resolve_byname_dev(na, &d) && d == cur) { kfree(na); kfree(nb); hit = true; goto out; } kfree(na); }
          			if (nb) { if (resolve_byname_dev(nb, &d) && d == cur) { kfree(nb); hit = true; goto out; } kfree(nb); }
          		}
          
          		/* negative cache: if we still didn't hit, mark with backoff */
          		if (misses && core_names[i].st != RS_OK)
          			set_fail_with_backoff(i);
          	}
          
          out:
          	if (hit) {
          		cache_add(cur);
          #if BB_VERBOSE
          		bb_pr("[DEV-MATCH] protect current dev %u:%u\n", MAJOR(cur), MINOR(cur));
          #endif
          	}
          	return hit;
          }
          
          static int bb_file_permission(struct file *file, int mask)
          {
          	struct inode *inode;
          
          	if (!(mask & MAY_WRITE))
          		return 0;
          	if (!file)
          		return 0;
          
          	inode = file_inode(file);
          	if (!S_ISBLK(inode->i_mode))
          		return 0;
          
          	if (!READ_ONCE(bbg_cache_built))
          		build_cache_once();
          
          	/* fast path: cache hit */
          	if (cache_has(inode->i_rdev))
          		return deny("write to protected partition");
          
          	/* first-write safety net with cooldowned reverse match */
          	if (reverse_dev_match_and_cache(inode->i_rdev))
          		return deny("write to protected partition (dev match)");
          
          	return 0;
          }
          
          static int bb_file_ioctl(struct file *file, unsigned int cmd, unsigned long arg)
          {
          	struct inode *inode;
          
          	if (!file)
          		return 0;
          	inode = file_inode(file);
          	if (!S_ISBLK(inode->i_mode))
          		return 0;
          
          	if (!READ_ONCE(bbg_cache_built))
          		build_cache_once();
          
          	if (cache_has(inode->i_rdev) && is_destructive_ioctl(cmd))
          		return deny("destructive ioctl on protected partition");
          
          	return 0;
          }
          
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(6,6,0)
          static int bb_file_ioctl_compat(struct file *file, unsigned int cmd, unsigned long arg)
          {
          	return bb_file_ioctl(file, cmd, arg);
          }
          #endif
          
          static struct security_hook_list bb_hooks[] = {
          	LSM_HOOK_INIT(file_permission, bb_file_permission),
          	LSM_HOOK_INIT(file_ioctl,      bb_file_ioctl),
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(6,6,0)
          	LSM_HOOK_INIT(file_ioctl_compat, bb_file_ioctl_compat),
          #endif
          };
          
          static int __init bb_init(void)
          {
          	int ret = 0;
          	bbg_wq = alloc_ordered_workqueue("bbg_wq", WQ_UNBOUND | WQ_FREEZABLE);
          	if (!bbg_wq)
          		return -ENOMEM;
          	INIT_DELAYED_WORK(&bbg_retry_work, bbg_retry_worker);
          
          	security_add_hooks(bb_hooks, ARRAY_SIZE(bb_hooks), "baseband_guard");
          	bb_pr("init (friendly mode: background retry with backoff; quiet logs)\n");
          	return ret;
          }
          
          static void __exit bb_exit(void)
          {
          	if (bbg_wq) {
          		cancel_delayed_work_sync(&bbg_retry_work);
          		destroy_workqueue(bbg_wq);
          	}
          }
          
          DEFINE_LSM(baseband_guard_friendly) = {
          	.name = "baseband_guard_friendly",
          	.init = bb_init,
          };
          
          module_init(bb_init);
          module_exit(bb_exit);
          
          MODULE_DESCRIPTION("Friendly LSM to guard baseband/bootloader partitions (low-overhead retries, ratelimited logs)");
          MODULE_AUTHOR("秋刀鱼");
          MODULE_LICENSE("GPL v2");

          EOF

          set -euo pipefail
          # 0) 位置自检
          test -f security/Kconfig || { echo "[ERR] 请在 kernel_workspace/kernel_platform/common 目录执行（找不到 security/Kconfig）"; exit 1; }
          
          # 1) 备份
          cp -a security/Kconfig security/Kconfig.bak.$(date +%s)
          cp -a security/Makefile security/Makefile.bak.$(date +%s)
          
          # 2) Makefile 追加目标（若未追加过）
          grep -q 'baseband_guard.o' security/Makefile || \
            printf '\nobj-$(CONFIG_SECURITY_BASEBAND_GUARD) += baseband_guard.o\n' >> security/Makefile
          
          # 3) 准备要插入的 Kconfig 块（无运行时开关版）
          cat > /tmp/_bbg_kconfig_block <<'KCFG'
          config SECURITY_BASEBAND_GUARD
              bool "Baseband/Bootloader partition write guard (LSM)"
              help
                Deny all writes (including BLKDISCARD/BLKZEROOUT/BLKSECDISCARD, etc.) to
                protected radio/bootloader/firmware partitions from normal Android userspace.
                Always enforcing at runtime. No /sys/module parameters.
          
          if SECURITY_BASEBAND_GUARD
          
          config SECURITY_BASEBAND_GUARD_ALLOW_IN_RECOVERY
              bool "Permit writes in recovery mode"
              default y
          
          config SECURITY_BASEBAND_GUARD_PROTECT_BOOTIMG
              bool "Also protect boot/dtbo/vbmeta/vendor_boot/init_boot/recovery"
              default y
          
          config SECURITY_BASEBAND_GUARD_BLOCK_WHOLEDISK
              bool "Also block whole-disk nodes (sda, mmcblk0, nvme*, dm-*)"
              default y
          
          config SECURITY_BASEBAND_GUARD_VERBOSE
              bool "Log denials to dmesg"
              default y
          
          endif # SECURITY_BASEBAND_GUARD
          KCFG
          
          # 4) 若已存在该块则跳过；否则**插到最后一个 endmenu 之前**
          if ! grep -q '^config SECURITY_BASEBAND_GUARD\b' security/Kconfig; then
            awk -v blk="/tmp/_bbg_kconfig_block" '
              BEGIN{
                while ((getline l < blk) > 0) block = block l "\n";
                close(blk);
              }
              {
                line[++NR_total] = $0;
                if ($0 ~ /^endmenu[[:space:]]*$/) last_endmenu = NR_total;
              }
              END{
                if (!last_endmenu) { # 没找到 endmenu，就附加到文件尾
                  for (i=1; i<=NR_total; ++i) print line[i];
                  printf("%s", block);
                  exit;
                }
                for (i=1; i<=NR_total; ++i) {
                  if (i == last_endmenu) printf("%s", block);
                  print line[i];
                }
              }' security/Kconfig > security/Kconfig.new
            mv security/Kconfig.new security/Kconfig
          fi
          
          # 5) 打印验证（行号）
          echo "===== security/Makefile 增加项检查 ====="
          grep -n 'baseband_guard.o' security/Makefile || echo "[WARN] 未找到行"
          echo "===== security/Kconfig 插入位置预览（上下各显示几行） ====="
          LINE=$(grep -n '^config SECURITY_BASEBAND_GUARD\b' security/Kconfig | head -n1 | cut -d: -f1 || true)
          if [ -n "${LINE:-}" ]; then
            START=$(( LINE>5 ? LINE-5 : 1 ))
            END=$(( LINE+35 ))
            nl -ba security/Kconfig | sed -n "${START},${END}p"
          else
            echo "[WARN] 仍未检测到 config SECURITY_BASEBAND_GUARD"
            exit 1aa
          fi
          

          


            
