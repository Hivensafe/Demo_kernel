name: Build_TracePoint_check
on:
  workflow_dispatch:
    inputs:
      REPO_MANIFEST:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
        default: 'oneplus_ace5_pro'

      keep_original_settings:
        description: "📝保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间- 仅在取消勾选'保持原设置'时有效(不懂请保持默认)"
        required: false
        default: ''

      enable_feature_z:
        description: "添加风驰驱动"
        required: false
        default: true
        type: boolean

      enable_feature_b:
         description: "选择网络调度"
         required: false
         type: choice
         options:
            - 'FQ_CODEL'
            - 'BBR'
         default: 'FQ_CODEL'
      
       


jobs:
  build:
    name: Build_${{ github.event.inputs.REPO_MANIFEST }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 📊 Check disk space (检查磁盘空间)
        run: |
          echo "构建前磁盘空间："
          df -h
      
      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_ace5_pro_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_ace5_pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Ace_5_Pro" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_13_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_13" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=oneplus_13t" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13t" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_13_T" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=oneplus_pad_2_pro" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_pad_2_pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Pad_2_Pro_New" >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Ace_5_Ultra" >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=realme_GT7" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7" >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo "REPO_MANIFEST=realme_GT7pro" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7pro" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo "REPO_MANIFEST=realme_GT7pro_Speed" >> $GITHUB_ENV
              echo "DEVICES_NAME=realme_GT7pro_Speed" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV
              ;;
          esac
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_13 | oneplus_ace5_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g4dc61d72e02f-abogki415959920-4k' >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo 'DEFAULT_SUFFIX=-android15-8-g013ec21bba94-abogki383916444-4k' >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo 'DEFAULT_SUFFIX=-android15-8-g06c41a4a6e98-abogki395793266-4k' >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo 'DEFAULT_SUFFIX=-android15-8-gc6f5283046c6-ab12364222-4k' >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo 'DEFAULT_SUFFIX=-android15-8-gd43086512890-abogki423825152-4k' >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g7b1f455c7143-ab13591283-4k' >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo 'DEFAULT_SUFFIX=-android15-8-g29d86c5fc9dd-abogki428889875-4k' >> $GITHUB_ENV
              ;;
          esac
          if [ "${{ github.event.inputs.keep_original_settings }}" = "false" ] && [ -n "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            echo "使用自定义构建时间: $CUSTOM_TIME"
            echo "KERNEL_TIME=$CUSTOM_TIME" >> $GITHUB_ENV
          else
            case "${{ github.event.inputs.REPO_MANIFEST }}" in
              oneplus_13 | oneplus_ace5_pro)
                echo 'KERNEL_TIME=Mon May 12 09:09:59 UTC 2025' >> $GITHUB_ENV
                ;;
              realme_GT7pro_Speed)
                echo 'KERNEL_TIME=Tue Dec 17 23:36:49 UTC 2024' >> $GITHUB_ENV
                ;;
              realme_GT7)
                echo 'KERNEL_TIME=Mon Jan 20 03:24:58 UTC 2025' >> $GITHUB_ENV
                ;;
              realme_GT7pro)
                echo 'KERNEL_TIME=Fri Sep 13 02:08:57 UTC 2024' >> $GITHUB_ENV
                ;;
              oneplus_13t)
                echo 'KERNEL_TIME=Tue Jun 10 12:12:23 UTC 2025' >> $GITHUB_ENV
                ;;
              oneplus_pad_2_pro)
                echo 'KERNEL_TIME=Tue Jun  3 03:22:33 UTC 2025' >> $GITHUB_ENV
                ;;
              oneplus_ace5_ultra)
                echo 'KERNEL_TIME=Tue Jul  1 19:48:18 UTC 2025' >> $GITHUB_ENV
                ;;
            esac
          fi
      - name: ⚙️ Set device-specific CCACHE_DIR (设置对应机型Cceche路径)
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${REPO_MANIFEST}" >> $GITHUB_ENV

      - name: 📦 Configure Git (设置下载账户)
        run: |
          git config --global user.name "Q1udaoyu"
          git config --global user.email "sucisama2888@gmail.com"

      - name: 🛠 Configure APT caching (配置APT缓存)
        run: |
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR"/{archives,lists/partial}
          echo "Dir::Cache \"$APT_CACHE_DIR\";" | sudo tee /etc/apt/apt.conf.d/90user-cache
          echo "Dir::Cache::archives \"$APT_CACHE_DIR/archives\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Dir::State::lists \"$APT_CACHE_DIR/lists\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Check-Valid-Until \"false\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Languages \"none\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          sudo chown -R $USER:$USER "$APT_CACHE_DIR"

      - name: 🛠 Cache APT packages (缓存APT包)
        uses: actions/cache@v3
        with:
          path: ${{ env.HOME }}/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_serialID_check.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: 📦 Install dependencies (安装依赖)
        run: |
          sudo rm -f /var/lib/apt/lists/lock /var/lib/dpkg/lock
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR/lists/partial"
          sudo apt -o Dir::Cache="$APT_CACHE_DIR" update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt -o Dir::Cache="$APT_CACHE_DIR" install -yq --no-install-recommends \
            python3 p7zip-full git curl ccache libelf-dev \
            build-essential libelf-dev flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip
          
          echo "✅ 依赖安装完成"
          
      - name: 📥 Restore ccache (载入 机型：${{ env.DEVICES_NAME }}的 ccache 缓存)
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref }}-${{ env.REPO_MANIFEST }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.REPO_MANIFEST }}-
            ccache-${{ runner.os }}-

      - name: 📥 Init ccache (如果是第一次运行则初始化Cceche)
        run: |
          export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"

          INIT_FLAG="$CCACHE_DIR/.ccache_initialized"
          if command -v ccache >/dev/null 2>&1; then
            if [ ! -f "$INIT_FLAG" ]; then
              echo "初始化 ccache ($CCACHE_DIR)..."
              mkdir -p "$CCACHE_DIR"
              ccache -M "$CCACHE_MAXSIZE"
              touch "$INIT_FLAG"
            else
              echo "ccache 已初始化，跳过"
            fi
          else
            echo "未安装 ccache，跳过"
          fi


      - name: 📥 Install repo tool (下载repo工具)
        run: |
         curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
         chmod a+x ~/repo
         sudo mv ~/repo /usr/local/bin/repo

      - name: 📥 Initialize repo and sync (初始化repo并同步内核源码)
        run: |
         mkdir kernel_workspace && cd kernel_workspace
         repo init -u https://github.com/showdo/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m ${REPO_MANIFEST}.xml --depth=1
         repo --trace sync -c -j$(nproc --all) --no-tags
         rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
         rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"

      - name: Patch main.c (cat拼接soc0 serial_number panic校验)
        working-directory: kernel_workspace/kernel_platform/common
        run: |
          # 防重复 patch
          if grep -q 'SOC_SN_CHECK' init/main.c; then
            echo "main.c 已包含 patch, 跳过"
            exit 0
          fi
      
          cp "${GITHUB_WORKSPACE}/.github/workflows/tools/serialid_check.c" ./
          LINE=$(grep -n '^#include' init/main.c | tail -n 1 | cut -d: -f1)
          head -n "$LINE" init/main.c > init/main.c.patched
          cat serialid_check.c >> init/main.c.patched
          tail -n +$((LINE+1)) init/main.c >> init/main.c.patched
          mv init/main.c.patched init/main.c
          echo "已自动插入 serialid_check.c 到 main.c"


            
      - name: ⚙️ Set SuKiSU Ultra (设置SuKiSU Ultra)
        run: |
            mkdir -p kernel_workspace/kernel_platform
            cd kernel_workspace/kernel_platform
            
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/susfs-main/kernel/setup.sh" -o setup.sh && bash setup.sh susfs-main
            cd KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main 2>/dev/null || echo 13000) + 10700)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
             cp "${GITHUB_WORKSPACE}/.github/workflows/tools/setup.bin" ./
            chmod +x setup.bin
            if [ ! -f "kernel/Makefile" ]; then
              echo "::error ::kernel/Makefile"
              ls -la
              exit 1
            fi
            ./setup.bin
      - name: 🔧 Set up SUSFS (配置 SUSFS)
        run: |
          set -eo pipefail
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
          git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git
          
          cd kernel_platform
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common
          
          # 正确的 OR 条件
          if [ "${REPO_MANIFEST}" = "oneplus_ace5_ultra" ] || [ "${REPO_MANIFEST}" = "oneplus_13t" ]; then
            sed -i 's/^\(SUBLEVEL[[:space:]]*=[[:space:]]*\).*/\166/' ./Makefile
          fi
          
          # if [ "$DEVICES_NAME" != "oneplus_ace5_ultra" ] || [ "${REPO_MANIFEST}" != "realme_GT7" ]; then
            files=(
              "lib/lz4/lz4_compress.c"
              "lib/lz4/lz4_decompress.c"
              "lib/lz4/lz4defs.h"
              "lib/lz4/lz4hc_compress.c"
            )
            for file in "${files[@]}"; do
              [ -e "$file" ] && rm "$file"
            done
            cp -r "${GITHUB_WORKSPACE}/zram/lz4/"* ./lib/lz4/
            cp -r "${GITHUB_WORKSPACE}/zram/include/linux/"* ./include/linux/
            cp "${GITHUB_WORKSPACE}/zram/6.6/lz4_1.10.0.patch" ./
            patch -p1 -F 3 --fuzz=5 < lz4_1.10.0.patch || true
          
            if [ -f "fs/f2fs/Makefile" ]; then
              if ! grep -qF "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" "fs/f2fs/Makefile"; then
                echo 'f2fs-$(CONFIG_F2FS_IOSTAT) += iostat.o' >> "fs/f2fs/Makefile"
                echo "已添加: f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o"
              else
                echo "文件已经包含: f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o"
              fi
            else
              echo "文件不存在: fs/f2fs/Makefile"
            fi
          
          # SUSFS 主补丁
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          set -euo pipefail
          # 当前位置：kernel_workspace/kernel_platform/common
          
          echo "[1/7] 写入守卫与开关源文件..."
          mkdir -p drivers/kernelsu include/linux
          
          # --- drivers/kernelsu/ksu_trace_guard.h（强防护 v2：static key + 安全上下文 + per-task + per-cpu） ---
          cat > drivers/kernelsu/ksu_trace_guard.h << 'EOF'
          /* SPDX-License-Identifier: GPL-2.0 */
          #pragma once
          #include <linux/jump_label.h>
          #include <linux/percpu.h>
          #include <linux/preempt.h>
          #include <linux/interrupt.h>
          #include <linux/sched.h>
          #include <linux/pid.h>
          #include <linux/sched/mm.h>
          #include <linux/rcupdate.h>
          #include <linux/mm.h>
          #include <linux/bitops.h>
          
          DECLARE_STATIC_KEY_FALSE(ksu_tp_key);
          DECLARE_PER_CPU(unsigned int, ksu_tp_depth);
          
          /* per-task 轻量防重入（跨CPU），1K位图 */
          #ifndef KSU_TASK_GUARD_BITS
          #define KSU_TASK_GUARD_BITS 1024
          #endif
          static unsigned long __ksu_task_guard_bitmap[BITS_TO_LONGS(KSU_TASK_GUARD_BITS)];
          
          static __always_inline u32 ksu_task_hash(const struct task_struct *t)
          {
          	u64 x = (u64)(uintptr_t)t ^ ((u64)task_pid_nr(t) << 17);
          	x ^= x >> 12; x ^= x << 25; x ^= x >> 27;
          	return (u32)(x & (KSU_TASK_GUARD_BITS - 1));
          }
          static __always_inline bool ksu_task_enter_once(const struct task_struct *t)
          {
          	u32 idx = ksu_task_hash(t);
          	return !test_and_set_bit(idx, __ksu_task_guard_bitmap);
          }
          static __always_inline void ksu_task_leave(const struct task_struct *t)
          {
          	u32 idx = ksu_task_hash(t);
          	clear_bit(idx, __ksu_task_guard_bitmap);
          }
          
          /* 上下文安全：仅允许用户进程、RCU watching、非原子、非中断、非回收、系统已运行 */
          static __always_inline bool ksu_safe_context(void)
          {
          	if (unlikely(system_state != SYSTEM_RUNNING))
          		return false;
          	if (unlikely(!rcu_is_watching()))
          		return false;
          	if (unlikely(in_interrupt()) || unlikely(irqs_disabled()) || unlikely(oops_in_progress))
          		return false;
          	if (unlikely(!current->mm))
          		return false;
          	if (unlikely(current->flags & (PF_KTHREAD | PF_EXITING | PF_DUMPCORE |
          	                               PF_MEMALLOC | PF_MEMALLOC_NOFS | PF_MEMALLOC_NOCMA)))
          		return false;
          	if (unlikely(preempt_count()))
          		return false;
          	if (unlikely(!pid_task(find_vpid(1), PIDTYPE_PID)))
          		return false;
          	return true;
          }
          
          /* per-cpu 深度，阻断同CPU重入 */
          static __always_inline bool ksu_cpu_enter_once(void)
          {
          	bool ok=false;
          	preempt_disable();
          	if (__this_cpu_read(ksu_tp_depth) == 0) {
          		__this_cpu_inc(ksu_tp_depth);
          		ok=true;
          	}
          	preempt_enable();
          	return ok;
          }
          static __always_inline void ksu_cpu_leave(void)
          {
          	preempt_disable();
          	__this_cpu_dec(ksu_tp_depth);
          	preempt_enable();
          }
          
          /* 统一宏：static key + 安全上下文 + per-task + per-cpu */
          #define KSU_TRACE_SAFE_CALL(_call)                                              \
          	do {                                                                        \
          		if (static_branch_unlikely(&ksu_tp_key) && ksu_safe_context()) {        \
          			if (ksu_task_enter_once(current)) {                                 \
          				if (ksu_cpu_enter_once()) {                                     \
          					_call;                                                      \
          					ksu_cpu_leave();                                            \
          				}                                                               \
          				ksu_task_leave(current);                                        \
          			}                                                                   \
          		}                                                                       \
          	} while (0)
          EOF
          
          # --- drivers/kernelsu/ksu_trace_toggle.c（debugfs: /sys/kernel/debug/ksu_trace/enable） ---
          cat > drivers/kernelsu/ksu_trace_toggle.c << 'EOF'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/init.h>
          #include <linux/module.h>
          #include <linux/debugfs.h>
          #include <linux/uaccess.h>
          #include <linux/jump_label.h>
          #include "ksu_trace_guard.h"
          
          DEFINE_STATIC_KEY_FALSE(ksu_tp_key);
          DEFINE_PER_CPU(unsigned int, ksu_tp_depth);
          
          static struct dentry *ksu_dbg_dir;
          static bool enabled_cached;
          
          static ssize_t enable_read(struct file *f, char __user *buf, size_t len, loff_t *ppos)
          {
          	char kbuf[4];
          	int n = scnprintf(kbuf, sizeof(kbuf), "%d\n", enabled_cached ? 1 : 0);
          	return simple_read_from_buffer(buf, len, ppos, kbuf, n);
          }
          
          static ssize_t enable_write(struct file *f, const char __user *buf, size_t len, loff_t *ppos)
          {
          	char kbuf[8]; bool want;
          	if (len > sizeof(kbuf) - 1) len = sizeof(kbuf) - 1;
          	if (copy_from_user(kbuf, buf, len)) return -EFAULT;
          	kbuf[len] = '\0';
          	want = !!simple_strtoul(kbuf, NULL, 0);
          
          	if (want && !enabled_cached) {
          		static_branch_enable(&ksu_tp_key);
          		enabled_cached = true;
          	} else if (!want && enabled_cached) {
          		static_branch_disable(&ksu_tp_key);
          		enabled_cached = false;
          	}
          	return len;
          }
          
          static const struct file_operations enable_fops = {
          	.owner = THIS_MODULE, .open = simple_open, .read = enable_read,
          	.write = enable_write, .llseek = default_llseek,
          };
          
          static int __init ksu_trace_toggle_init(void)
          {
          	ksu_dbg_dir = debugfs_create_dir("ksu_trace", NULL);
          	if (IS_ERR_OR_NULL(ksu_dbg_dir)) return 0;
          	debugfs_create_file("enable", 0644, ksu_dbg_dir, NULL, &enable_fops);
          	enabled_cached = false; /* 默认关闭 */
          	return 0;
          }
          late_initcall(ksu_trace_toggle_init);
          EOF
          
          echo "[2/7] 写入 forwarder 头（避免相对 include）..."
          # --- include/linux/ksu_trace_export.h（优先 export.h，不在则回退 ksu_trace.h） ---
          cat > include/linux/ksu_trace_export.h << 'EOF'
          /* SPDX-License-Identifier: GPL-2.0 */
          #ifndef _LINUX_KSU_TRACE_EXPORT_FWD_H
          #define _LINUX_KSU_TRACE_EXPORT_FWD_H
          #if defined(__has_include)
          #  if __has_include("../../drivers/kernelsu/ksu_trace_export.h")
          #    include "../../drivers/kernelsu/ksu_trace_export.h"
          #  elif __has_include("../../drivers/kernelsu/ksu_trace.h")
          #    include "../../drivers/kernelsu/ksu_trace.h"
          #  else
          #    error "KernelSU trace header not found (ksu_trace_export.h/ksu_trace.h)"
          #  endif
          #else
          #  include "../../drivers/kernelsu/ksu_trace_export.h"
          #endif
          #endif
          EOF
          
          # --- include/linux/ksu_trace_guard.h（转发到我们的守卫头） ---
          cat > include/linux/ksu_trace_guard.h << 'EOF'
          /* SPDX-License-Identifier: GPL-2.0 */
          #ifndef _LINUX_KSU_TRACE_GUARD_FWD_H
          #define _LINUX_KSU_TRACE_GUARD_FWD_H
          #include "../../drivers/kernelsu/ksu_trace_guard.h"
          #endif
          EOF
          
          echo "[3/7] Makefile 增加 toggle.o..."
          mf="drivers/kernelsu/Makefile"
          if [ -f "$mf" ] && ! grep -q 'ksu_trace_toggle\.o' "$mf"; then
            printf '\n# runtime toggle for trace hooks (default OFF)\nobj-$(CONFIG_KSU_TRACEPOINT_HOOK) += ksu_trace_toggle.o\n' >> "$mf"
          fi
          
          echo "[4/7] 顶部插入 include（3 个点：exec/input/pty）..."
          fix_includes_top() {
            local f="$1"; [ -f "$f" ] || return 0
            sed -i '/ksu_trace_guard\.h/d;/ksu_trace_export\.h/d;/ksu_trace\.h/d' "$f"
            awk '
              BEGIN{ last=0 }
              { lines[NR]=$0; if ($0 ~ /^#include[ \t]/) last=NR }
              END{
                for (i=1;i<=NR;i++){
                  print lines[i];
                  if (i==last){
                    print "#if defined(CONFIG_KSU) && defined(CONFIG_KSU_TRACEPOINT_HOOK)"
                    print "#include <linux/ksu_trace_export.h>"
                    print "#include <linux/ksu_trace_guard.h>"
                    print "#endif"
                  }
                }
                if (NR==0){
                  print "#if defined(CONFIG_KSU) && defined(CONFIG_KSU_TRACEPOINT_HOOK)"
                  print "#include <linux/ksu_trace_export.h>"
                  print "#include <linux/ksu_trace_guard.h>"
                  print "#endif"
                }
              }' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          }
          fix_includes_top fs/exec.c
          fix_includes_top drivers/input/input.c
          fix_includes_top drivers/tty/pty.c
          
          echo "[5/7] 注入最小调用点..."
          # -- exec.c：do_execve 与 do_execveat（只在这里，避免高频 VFS 热路径）
          if [ -f "fs/exec.c" ]; then
            awk '
              {
                if ($0 ~ /trace_ksu_trace_execveat_hook\(/) {
                  print "  /* KSU SAFE */"
                  print "  KSU_TRACE_SAFE_CALL({ int dfd=AT_FDCWD; trace_ksu_trace_execveat_hook(&dfd, &filename, &argv, &envp, 0); });"
                  getline; next
                }
                if ($0 ~ /trace_ksu_trace_execveat_sucompat_hook\(/) {
                  print "  /* KSU SAFE */"
                  print "  KSU_TRACE_SAFE_CALL({ int dfd=AT_FDCWD; trace_ksu_trace_execveat_sucompat_hook(&dfd, &filename, NULL, NULL, NULL); });"
                  getline; next
                }
                print
              }' fs/exec.c > fs/exec.c.tmp && mv fs/exec.c.tmp fs/exec.c
          fi
          
          # -- input.c：input_event 内（用户输入较晚触发）
          if [ -f "drivers/input/input.c" ]; then
            if ! grep -q 'trace_ksu_trace_input_hook' drivers/input/input.c; then
              # 在 "unsigned long flags;" 之后插入
              awk '
                BEGIN{infunc=0; injected=0}
                {
                  print
                  if ($0 ~ /^void[ \t]+input_event\(/) infunc=1
                  if (infunc && !injected && $0 ~ /unsigned long flags;/) {
                    print "#if defined(CONFIG_KSU) && defined(CONFIG_KSU_TRACEPOINT_HOOK)"
                    print "  KSU_TRACE_SAFE_CALL(trace_ksu_trace_input_hook(&type, &code, &value));"
                    print "#endif"
                    injected=1
                  }
                  if (infunc && $0 ~ /^}/) infunc=0
                }' drivers/input/input.c > drivers/input/input.c.tmp && mv drivers/input/input.c.tmp drivers/input/input.c
            else
              # 已有裸调用则包裹
              sed -i -E 's/([[:space:]]*)trace_ksu_trace_input_hook\((.*)\);/\1KSU_TRACE_SAFE_CALL(trace_ksu_trace_input_hook(\2));/g' drivers/input/input.c
            fi
          fi
          
          # -- pty.c：优先 pts_unix98_lookup（变量名 file）；若没有，退回 pty_close（变量名 filp）
          sed -i '/trace_ksu_trace_devpts_hook/d' drivers/tty/pty.c || true
          if grep -q '^static[[:space:]]\+struct[[:space:]]\+tty_struct[[:space:]]*\* *pts_unix98_lookup' drivers/tty/pty.c; then
            awk '
              BEGIN{infun=0; inserted=0}
              {
                print
                if ($0 ~ /^static[[:space:]]+struct[[:space:]]+tty_struct[[:space:]]*\* *pts_unix98_lookup/) { infun=1 }
                if (infun && inserted==0 && $0 ~ /mutex_lock\(&devpts_mutex\)/) {
                  print "#if defined(CONFIG_KSU) && defined(CONFIG_KSU_TRACEPOINT_HOOK)"
                  print "  KSU_TRACE_SAFE_CALL({ struct inode *inode = d_inode(file->f_path.dentry); if (inode) trace_ksu_trace_devpts_hook(inode); });"
                  print "#endif"
                  inserted=1
                }
                if (infun && $0 ~ /^}/) { infun=0 }
              }' drivers/tty/pty.c > drivers/tty/pty.c.tmp && mv drivers/tty/pty.c.tmp drivers/tty/pty.c
          elif grep -q '^static[[:space:]]\+void[[:space:]]\+pty_close' drivers/tty/pty.c; then
            awk '
              BEGIN{infun=0; inserted=0}
              {
                print
                if ($0 ~ /^static[[:space:]]+void[[:space:]]+pty_close\(.*\)/) { infun=1 }
                if (infun && inserted==0 && $0 ~ /mutex_lock\(&devpts_mutex\)/) {
                  print "#if defined(CONFIG_KSU) && defined(CONFIG_KSU_TRACEPOINT_HOOK)"
                  print "  KSU_TRACE_SAFE_CALL({ struct inode *inode = d_inode(filp->f_path.dentry); if (inode) trace_ksu_trace_devpts_hook(inode); });"
                  print "#endif"
                  inserted=1
                }
                if (infun && $0 ~ /^}/) { infun=0 }
              }' drivers/tty/pty.c > drivers/tty/pty.c.tmp && mv drivers/tty/pty.c.tmp drivers/tty/pty.c
          else
            echo "[warn] 未找到 pts_unix98_lookup()/pty_close()，跳过 devpts hook"
          fi
          
          echo "[6/7] 确保未触碰高频 VFS 路径（read/stat/faccessat）..."
          # 万一之前加过，先移除，避免早期递归/高频触发
          sed -i '/trace_ksu_trace_sys_read_hook/d' fs/read_write.c 2>/dev/null || true
          sed -i '/trace_ksu_trace_stat_hook/d' fs/stat.c        2>/dev/null || true
          sed -i '/trace_ksu_trace_faccessat_hook/d' fs/open.c    2>/dev/null || true
          
          echo "[7/7] 快速自检："
          grep -R --line-number -E 'ksu_trace_(export|guard)\.h' fs drivers || true
          echo "[OK] 最小 Tracepoint 集成完成（默认关闭）。"
          echo "[HINT] 启用： mount -t debugfs debugfs /sys/kernel/debug || true && echo 1 > /sys/kernel/debug/ksu_trace/enable"






      - name: 🔧 Cache HMBird patch (缓存HMBird补丁)
        uses: actions/cache@v3
        with:
          path: ${{ runner.temp }}/hmbird_patch.c
          key: hmbird-patch-v1
          restore-keys: |
            hmbird-patch-v1
            
      
      - name: 🔧 Apply HMBird GKI patch (写入单Boot开机补丁)
        run: |
          PATCH_FILE="${{ runner.temp }}/hmbird_patch.c"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "下载HMBird补丁..."
            cp "${GITHUB_WORKSPACE}/hmbird_patch.c" "$PATCH_FILE"
          fi
          
          cd kernel_workspace/kernel_platform/common/drivers
          cp "$PATCH_FILE" hmbird_patch.c
          
          if ! grep -q "hmbird_patch.o" Makefile; then
            echo "obj-y += hmbird_patch.o" >> Makefile
          fi
          echo "HMBird补丁应用完成"

          
      - name: 🔧 Set gki_defconfig (设置编译配置)
        env:
          ENABLE_B: ${{ github.event.inputs.enable_feature_b }}       
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          # Add VFS configuration settings
          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_TRACEPOINT_HOOK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEBUG_FS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_COMPRESSION=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KERNEL_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig          

          if [ "$ENABLE_B" = "BBR" ]; then
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BIC=n" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_CUBIC=n" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_HTCP=n" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          if [ "$ENABLE_B" = "FQ_CODEL" ]; then
            echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_SFQ=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_HTB=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_TBF=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_SFB=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_RED=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_INGRESS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_DEFAULT_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo 'CONFIG_DEFAULT_NET_SCH="fq_codel"' >> ./common/arch/arm64/configs/gki_defconfig
          fi
          
          # Add SUSFS configuration settings
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "BUILD Kernel"

      - name: 🔧 Set Kernel name (写入内核名称)
        env:
          REPO_MANIFEST: ${{ github.event.inputs.REPO_MANIFEST }}
          KEEP_ORIGINAL: ${{ github.event.inputs.keep_original_settings }}
          CUSTOM_SUFFIX: ${{ github.event.inputs.custom_kernel_suffix }}
        run: |
          cd kernel_workspace/kernel_platform
          echo "当前机型: $DEVICES_NAME"
          echo "保持原设置: $KEEP_ORIGINAL"
          echo "自定义后缀: $CUSTOM_SUFFIX"
          echo "默认后缀: $DEFAULT_SUFFIX"
          
          if [ "$KEEP_ORIGINAL" = "false" ]; then
            if [ -n "$CUSTOM_SUFFIX" ]; then
              DEFAULT_SUFFIX="$CUSTOM_SUFFIX"
              echo "使用自定义内核名称: $DEFAULT_SUFFIX"
            else
              echo "使用机型默认内核名称: $DEFAULT_SUFFIX"
            fi
          else
            echo "保持原内核名称设置"
          fi
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          
      - name: 🔧 Add sched_ext (写入风驰补丁)
        if: ${{inputs.enable_feature_z }}
        run: |
         cd kernel_workspace/kernel_platform/
         git clone https://github.com/HanKuCha/sched_ext.git
         cp -r ./sched_ext/* ./common/kernel/sched
         rm -rf ./sched_ext/.git
         cd common/kernel/sched 
        
      - name: 🔨 Build Kernel (构建内核)
        run: |
          export PATH="/usr/lib/ccache:$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"          
          export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          cd kernel_workspace/kernel_platform/common
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out KCFLAGS+=-O2  gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out KCFLAGS+=-O2  Image
      - name: 📦 ReName Image  (修改镜像名)
        run: |
          cd kernel_workspace/kernel_platform/common/out/arch/arm64/boot
          cp ./Image "./${IMAGENAME}"

      - name: 📤 Upload Image (上传 Image)
        uses: actions/upload-artifact@v4
        with:
         name: ${{ env.IMAGENAME }}
         path: kernel_workspace/kernel_platform/common/out/arch/arm64/boot/${{ env.IMAGENAME }}
        
      - name: 📦 Make AnyKernel3 (创建Anykernel3)
        run: |
          git clone https://github.com/showdo/AnyKernel3.git --depth=1      
          rm -rf ./AnyKernel3/.git
          rm -rf ./AnyKernel3/push.sh
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/
          7z a -t7z -p'501b10728d2cb08abe16eb8b0bdee33c9d2382e1' -mhe=on ./AnyKernel3/TG频道@qdykernel.7z ./AnyKernel3/Image
          rm -rf ./AnyKernel3/Image
          
      - name: 📤 Upload AnyKernel3 (上传 Anykernel3)
        uses: actions/upload-artifact@v4
        with:
         name: AK3_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}_SuKiSU
         path: ./AnyKernel3/*
