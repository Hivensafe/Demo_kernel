name: 🧪 Debug main.bin

on:
  workflow_dispatch:

jobs:
  check-bin:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Copy main.bin
        run: cp "${GITHUB_WORKSPACE}/.github/workflows/main.bin" ./

      - name: 🔍 Show file type
        run: file ./main.bin

      - name: 🔍 Show first 10 lines
        run: head -10 ./main.bin

      - name: 🔍 Show first 32 bytes (hex)
        run: head -c 32 ./main.bin | xxd

      - name: 📝 Try bash execute
        run: bash ./main.bin setup_device_info "oneplus_ace5_pro" || true
